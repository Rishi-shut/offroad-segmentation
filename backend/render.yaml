services:
  - type: web
    name: offroad-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: MODEL_PATH
        value: best_model.pth
      - key: QDRANT_URL
        value: https://your-qdrant-cluster.qdrant.cloud
      - key: QDRANT_API_KEY
        value: your-qdrant-api-key
      - key: DATABASE_URL
        value: postgres://user:pass@host:5432/db
    resources:
      - name: offroad-backend
        plan: free

builds:
  - python: "3.11"
    requirements: []